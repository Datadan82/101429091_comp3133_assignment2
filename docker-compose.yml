version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emptrack-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
    networks:
      - emptrack-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emptrack-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - emptrack-net
    restart: unless-stopped

networks:
  emptrack-net:
    driver: bridge
